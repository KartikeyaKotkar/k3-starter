---
- name: Bootstrap k3s cluster
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Ensure curl is installed
      apt:
        name: curl
        state: present
        update_cache: yes

    - name: Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_check

    - name: Download and install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      when: not k3s_check.stat.exists

    - name: Wait for k3s service to be active
      systemd:
        name: k3s
        state: started
      register: k3s_service
      until: k3s_service.status.ActiveState == "active"
      retries: 10
      delay: 5

    - name: Fetch kubeconfig to local machine
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ../kubeconfig
        flat: yes

- name: Update local kubeconfig server IP
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Replace 127.0.0.1 with first node public IP
      replace:
        path: ../kubeconfig
        regexp: 'https://127\.0\.0\.1:6443'
        replace: 'https://{{ hostvars[groups["k3s_cluster"][0]]["inventory_hostname"] }}:6443'
