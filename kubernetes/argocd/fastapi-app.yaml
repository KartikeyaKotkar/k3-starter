apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-sample-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/KartikeyaKotkar/k3-starter.git'
    targetRevision: HEAD
    path: kubernetes/sample-app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
