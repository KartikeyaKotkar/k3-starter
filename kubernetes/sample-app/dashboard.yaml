apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-dashboard
  labels:
    # This label tells the Grafana sidecar to import this dashboard
    grafana_dashboard: "1"
data:
  fastapi.json: |-
    {
      "title": "FastAPI Metrics",
      "panels": [
        {
          "title": "Request Rate (per second)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"fastapi-service\"}[1m])) by (handler)",
              "legendFormat": "{{handler}}"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }
        },
        {
          "title": "Error Rate (per second)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"fastapi-service\", status=~\"5..\"}[1m])) by (handler)",
              "legendFormat": "5xx {{handler}}"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }
        },
        {
          "title": "Latency (95th percentile)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"fastapi-service\"}[5m])) by (le, handler))",
              "legendFormat": "{{handler}}"
            }
          ],
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 }
        }
      ]
    }
